openrouter:
  model: "deepseek/deepseek-v3.2"

scraper:
  target_queries:
    - "college backpack"
    - "student ID wallet"
    - "laptop stand desk"
    - "college dorm supplies"
    - "noise cancelling headphones student"
  max_reviews_per_query: 200
  headless: true

clustering:
  sweep_range: [3, 10]
  scoring_weights:
    silhouette: 0.5
    intra_similarity: 0.3
    inter_distance: 0.2

# Phase 2 — uncomment to activate
